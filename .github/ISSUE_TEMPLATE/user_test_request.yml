name: User test request
description: ユーザー実機テストの依頼を登録する
title: "[User Test]: "
labels:
  - user-test
body:
  - type: markdown
    attributes:
      value: |
        ユーザー実機テスト依頼テンプレートです。
        Notion「AI開発管理」のテスト依頼とアイさん確認結果に紐づけて使います。
  - type: input
    id: notion_task_url
    attributes:
      label: NotionタスクURL
      placeholder: https://www.notion.so/...
    validations:
      required: true
  - type: input
    id: pr_url
    attributes:
      label: PR URL
      placeholder: https://github.com/.../pull/...
    validations:
      required: true
  - type: textarea
    id: test_scope
    attributes:
      label: テスト範囲
      description: 確認してほしい画面、操作、データ範囲を記載してください。
    validations:
      required: true
  - type: textarea
    id: test_steps
    attributes:
      label: テスト手順
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected_result
    attributes:
      label: 期待結果
      description: OKと判断する条件を記載してください。
    validations:
      required: true
  - type: textarea
    id: rollback_or_stop
    attributes:
      label: NG時の停止・差戻し条件
      description: どの状態なら公開停止、差戻し、保留にするかを記載してください。
    validations:
      required: true
  - type: checkboxes
    id: test_checks
    attributes:
      label: 確認事項
      options:
        - label: multi-company / companyId を跨いだデータ混在がない
          required: true
        - label: 税務・会計ロジックは人間確認前提で表示される
          required: true
        - label: secret/token/API key が画面・ログ・Issue・PRに出ていない
          required: true
        - label: エラー時にユーザーが次の行動を判断できる
          required: true
  - type: textarea
    id: user_result
    attributes:
      label: アイさん確認結果
      description: YES / NO / 保留 / 差戻し と理由を記載してください。
