name: Staging Migration

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type MIGRATE to run staging migrations.
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: staging-migration
  cancel-in-progress: false

jobs:
  migrate:
    name: Run staging Prisma migrations
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main' && github.event.inputs.confirm == 'MIGRATE'
    env:
      APP_DATABASE_URL: ${{ secrets.STAGING_APP_DATABASE_URL }}
      APP_DIRECT_URL: ${{ secrets.STAGING_APP_DIRECT_URL }}
      STAGING_DB_ALLOWED_HOSTS: ${{ secrets.STAGING_DB_ALLOWED_HOSTS }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Verify staging database env presence
        shell: bash
        run: |
          test -n "$APP_DATABASE_URL"
          test -n "$APP_DIRECT_URL"
          test -n "$STAGING_DB_ALLOWED_HOSTS"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Assert staging target
        run: node scripts/assert-staging-db.mjs

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Check migration status before deploy
        shell: bash
        continue-on-error: true
        run: |
          set +e
          node scripts/run-prisma.mjs migrate status > migrate-status-before.txt 2>&1
          grep -E '^[[:space:]]*[0-9]{6}_[A-Za-z0-9_-]+' migrate-status-before.txt || true
          rm -f migrate-status-before.txt
          exit 0

      - name: Deploy migrations to staging
        run: pnpm deploy:migrate

      - name: Check migration status after deploy
        shell: bash
        run: |
          set +e
          node scripts/run-prisma.mjs migrate status > migrate-status-after.txt 2>&1
          status=$?
          grep -E '^[[:space:]]*[0-9]{6}_[A-Za-z0-9_-]+' migrate-status-after.txt || true
          rm -f migrate-status-after.txt
          exit $status
